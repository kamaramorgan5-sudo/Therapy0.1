<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TherapyPod — AI Mental Wellness</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0a0e1a;--surface:#111827;--surface2:#1a2236;
    --border:rgba(255,255,255,0.07);--teal:#4ecdc4;
    --teal-dim:rgba(78,205,196,0.12);--blue:#6c9bff;
    --text:#e8eaf0;--muted:#8892a4;
    --user-bubble:#1e3a5f;--ai-bubble:#151f2e;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  body::before{content:'';position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(78,205,196,0.05) 0%,transparent 70%);pointer-events:none}
  body::after{content:'';position:fixed;bottom:-150px;right:-150px;width:500px;height:500px;background:radial-gradient(circle,rgba(108,155,255,0.05) 0%,transparent 70%);pointer-events:none}
  header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(10,14,26,0.95);backdrop-filter:blur(12px);flex-shrink:0}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--teal),var(--blue));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
  .logo-text{font-family:'DM Serif Display',serif;font-size:20px}
  .logo-text span{color:var(--teal)}
  .header-right{display:flex;align-items:center;gap:10px}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .status-text{font-size:12px;color:var(--muted);font-weight:500}
  .mood-bar{padding:8px 20px;display:flex;align-items:center;gap:10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
  .mood-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.8px}
  #mood-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;background:var(--teal-dim);color:var(--teal);border:1px solid rgba(78,205,196,0.25);transition:all 0.5s}
  .mood-dot{width:7px;height:7px;border-radius:50%;background:currentColor}
  #crisis-banner{display:none;background:rgba(255,107,107,0.1);border-bottom:1px solid rgba(255,107,107,0.3);padding:10px 20px;font-size:13px;color:#ff9f9f;text-align:center;flex-shrink:0}
  .messages{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
  .messages::-webkit-scrollbar{width:4px}
  .messages::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:4px}
  .intro-card{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:22px 18px;text-align:center}
  .intro-card h3{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:8px}
  .intro-card p{font-size:13px;color:var(--muted);line-height:1.65}
  .quick-prompts{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
  .quick-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:20px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s}
  .quick-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-dim)}
  .message{display:flex;gap:10px;animation:fadeUp 0.3s ease;max-width:100%}
  .message.user{flex-direction:row-reverse}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .avatar{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .avatar.ai{background:linear-gradient(135deg,var(--teal),var(--blue))}
  .avatar.user{background:var(--user-bubble);border:1px solid rgba(108,155,255,0.3)}
  .msg-wrap{display:flex;flex-direction:column;max-width:calc(100% - 50px)}
  .message.user .msg-wrap{align-items:flex-end}
  .bubble{padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.7}
  .message.ai .bubble{background:var(--ai-bubble);border:1px solid var(--border);border-top-left-radius:4px;color:var(--text)}
  .message.user .bubble{background:var(--user-bubble);border:1px solid rgba(108,155,255,0.2);border-top-right-radius:4px;color:#c8d8f0}
  .bubble-time{font-size:10px;color:var(--muted);margin-top:4px;opacity:0.6}
  .typing-indicator{display:flex;gap:5px;align-items:center;padding:12px 16px}
  .typing-indicator span{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:bounce 1.2s infinite}
  .typing-indicator span:nth-child(2){animation-delay:0.2s}
  .typing-indicator span:nth-child(3){animation-delay:0.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-6px);opacity:1}}
  .input-area{padding:12px 16px;background:rgba(10,14,26,0.95);border-top:1px solid var(--border);backdrop-filter:blur(12px);flex-shrink:0}
  .input-row{display:flex;gap:10px;align-items:flex-end;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:8px 8px 8px 16px;transition:border 0.2s}
  .input-row:focus-within{border-color:rgba(78,205,196,0.4)}
  #user-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;resize:none;max-height:120px;min-height:24px;line-height:1.5;padding:4px 0}
  #user-input::placeholder{color:var(--muted)}
  #send-btn{width:38px;height:38px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--teal),var(--blue));color:#0a0e1a;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;transition:opacity 0.2s,transform 0.1s}
  #send-btn:hover{opacity:0.85;transform:scale(1.05)}
  .input-hint{text-align:center;font-size:11px;color:var(--muted);margin-top:6px;opacity:0.6}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🧠</div>
    <div class="logo-text">Therapy<span>Pod</span></div>
  </div>
  <div class="header-right">
    <div class="status-dot"></div>
    <span class="status-text">AI Online</span>
  </div>
</header>

<div class="mood-bar">
  <span class="mood-label">Detected Mood</span>
  <div id="mood-badge"><span class="mood-dot"></span> Neutral</div>
</div>

<div id="crisis-banner">
  ⚠️ You are not alone. Please reach out now. Kenya: <strong>0800 720 625</strong> (free, 24/7)
</div>

<div class="messages" id="messages">
  <div class="intro-card">
    <h3>Your safe space 🌿</h3>
    <p>I'm here to listen without judgment. Share what's on your mind and I'll support you through it.</p>
    <div class="quick-prompts">
      <button class="quick-btn" onclick="sendQuick('I have been feeling really anxious lately')">I feel anxious</button>
      <button class="quick-btn" onclick="sendQuick('I am struggling to stay motivated')">Low motivation</button>
      <button class="quick-btn" onclick="sendQuick('I cannot sleep because of stress')">Stress and sleep</button>
      <button class="quick-btn" onclick="sendQuick('I feel very lonely and disconnected')">Feeling lonely</button>
      <button class="quick-btn" onclick="sendQuick('I am overwhelmed with everything going on')">Overwhelmed</button>
      <button class="quick-btn" onclick="sendQuick('I just need someone to talk to')">Just talk</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="user-input" rows="1" placeholder="Share what's on your mind..."></textarea>
    <button id="send-btn" onclick="sendMessage()">&#10148;</button>
  </div>
  <p class="input-hint">Press Enter to send &middot; Shift+Enter for new line</p>
</div>

<script>
const MOODS = {
  crisis:    { keys:['kill myself','want to die','end my life','suicide','suicidal','no reason to live','better off dead','hurt myself','self harm','cut myself','harm myself'], color:'#ff4444', label:'Crisis' },
  anxious:   { keys:['anxious','anxiety','panic','panicking','nervous','worried','worry','scared','dread','overthinking','racing thoughts','cant breathe','heart racing','on edge'], color:'#ffd166', label:'Anxious' },
  sad:       { keys:['sad','crying','cry','tears','depressed','depression','hopeless','empty','numb','broken','hurt','grief','grieve','mourning','miss them','lost someone'], color:'#6c9bff', label:'Sad' },
  angry:     { keys:['angry','anger','furious','rage','mad','frustrated','frustration','irritated','annoyed','hate','betrayed','unfair','resentment','livid'], color:'#ff6b6b', label:'Angry' },
  stressed:  { keys:['stressed','stress','pressure','burnout','burnt out','exhausted','tired','deadline','too much','cant cope','falling apart','overwhelmed','overworked'], color:'#ff9f6b', label:'Stressed' },
  lonely:    { keys:['lonely','loneliness','alone','isolated','no one','nobody','disconnected','invisible','ignored','rejected','left out','abandoned','no friends'], color:'#a78bfa', label:'Lonely' },
  grieving:  { keys:['grief','death','died','passed away','funeral','missing','gone','heartbreak','heartbroken','breakup','broke up','divorce','loss'], color:'#8892a4', label:'Grieving' },
  confused:  { keys:['confused','confusion','lost','dont know','unsure','uncertain','what to do','no direction','stuck','trapped','no purpose'], color:'#f9c74f', label:'Confused' },
  hopeful:   { keys:['motivated','excited','happy','grateful','thankful','good today','doing well','positive','hopeful','better','progress','achieved','proud','great'], color:'#4ecdc4', label:'Hopeful' }
};

const RESPONSES = {
  crisis: [
    "I'm genuinely concerned about you right now, and I want you to know your life has real value — even when it doesn't feel that way.\n\nPlease reach out to a crisis counselor immediately. Kenya: 0800 720 625 (free, 24/7). They are trained for exactly this moment and they will listen. Are you somewhere safe right now?",
    "What you're feeling is real, and it matters deeply. Please don't face this alone.\n\nCall a crisis line right now — Kenya: 0800 720 625. You deserve human support in this moment, more than words on a screen can give. I'm here with you, but please make that call."
  ],
  anxious: [
    "Anxiety can feel like your mind is running a race you never agreed to enter. What you're experiencing is your nervous system trying to protect you — even when there's no clear threat.\n\nTry this right now: breathe in for 4 counts, hold for 7, exhale slowly for 8. Repeat three times. This activates your body's calm response.\n\nWhat's been triggering these feelings most recently?",
    "I hear you — and living with anxiety takes real courage, because you show up every day despite how your mind makes things feel. That is strength.\n\nOften anxiety intensifies when we fight it. Try observing it instead: 'I notice I'm feeling anxious right now, and that's okay.' What area of life is causing you the most worry?",
    "Anxiety is exhausting, especially when it feels constant and uncontrollable. Your feelings are completely valid.\n\nA grounding technique that helps: look around and name 5 things you can see, 4 you can touch, 3 you can hear. This pulls your mind back to the present. What does the anxiety feel like in your body right now?"
  ],
  sad: [
    "I'm really sorry you're carrying this. Sadness is one of the heaviest emotions — and it takes courage to sit with it rather than run from it.\n\nYou don't have to explain yourself or justify how you feel. What's been weighing on your heart most heavily?",
    "Feeling deeply sad doesn't mean something is wrong with you — it means you're human. Some of the most compassionate people in the world feel things very deeply.\n\nHave you been able to talk to anyone close to you about this? Sometimes being truly heard can shift something inside us.",
    "I'm here with you in this. Sadness, especially when it lingers, can make the world feel colorless and distant.\n\nIs there something specific that brought these feelings on, or has it been building gradually? Understanding the root helps us find the right path forward together."
  ],
  angry: [
    "Anger is not a bad emotion — it's information. It's telling you that something matters deeply, or that a boundary has been crossed. The key is what we do with that energy.\n\nBefore we unpack what happened, take a breath. When anger peaks, our rational brain goes offline. Once you feel slightly calmer — what happened?",
    "I hear the frustration, and it makes complete sense. Feeling disrespected or treated unfairly is genuinely painful.\n\nBeneath anger there's often something more vulnerable — hurt, fear, or powerlessness. What do you think is really going on beneath the surface?",
    "Your anger is valid. Don't let anyone tell you otherwise.\n\nPhysical release can help first — a brisk walk, writing an unsent letter to whoever hurt you. Once the initial charge is released, thinking becomes clearer. What triggered this for you?"
  ],
  stressed: [
    "Stress at this level is your mind and body waving a red flag — it means you're carrying more than one person should carry alone. That is not weakness. It's a signal that something needs to change.\n\nLet's map it out. What are the top two or three things causing the most pressure right now?",
    "You are not supposed to be able to handle everything all at once. No one is. The pressure you're under is real and deserves to be taken seriously — not pushed through.\n\nTry this: write down everything on your mind right now. Don't organize it — just get it out of your head. What feels most urgent to you?",
    "Burnout builds when we keep giving without replenishing. How long have you been running on empty?\n\nRest is not a reward you earn after finishing everything. It is a requirement for functioning. Even 20 minutes with no phone and no tasks can start to shift things. What does your average day look like right now?"
  ],
  lonely: [
    "Loneliness is one of the most quietly painful things a person can experience — because it can exist even in a room full of people. The feeling that no one truly sees you is deeply human.\n\nI see you right now. Can you tell me more — is this a recent feeling, or something that's been with you for a long time?",
    "Thank you for sharing this. It takes real vulnerability to admit loneliness, because we're often told to hide it. It isn't something to be ashamed of — it's a human need, like hunger.\n\nIs there even one person in your life, someone you've grown distant from, who you used to feel connected to?",
    "Feeling disconnected from the world is exhausting in a way that's hard to put into words. You're not broken — you're someone who needs and deserves genuine connection.\n\nWhat are you most passionate about? Let's think about where you might find your people."
  ],
  grieving: [
    "Grief is love with nowhere to go — and that is one of the most painful things a person can experience. There is no right way to grieve, and there is no timeline.\n\nWould you like to tell me about what happened, or about who or what you've lost? Sometimes speaking it out loud is part of honoring it.",
    "I'm so sorry for what you're going through. Loss changes us — it reshapes how we see everything. And sometimes the hardest part is feeling like you have to hold it together for everyone else.\n\nYou don't have to hold it together here. How are you really doing?",
    "Heartbreak — whether from losing a person, a relationship, or a version of life you imagined — is real grief. Please don't minimize what you're feeling.\n\nGrief comes in waves. Some days feel manageable, others knock you flat. Where are you in that wave right now?"
  ],
  confused: [
    "Feeling lost is deeply unsettling — especially when everyone around you seems to have it figured out. Most people are navigating uncertainty too, just quietly.\n\nLet's slow down together. What area of your life feels most unclear — your purpose, a decision, a relationship?",
    "Not knowing what to do is not the same as doing something wrong. Confusion is often the space right before clarity arrives.\n\nInstead of asking 'what should I do,' try asking 'what do I know for certain right now?' Start from solid ground and build outward. What do you know for sure?",
    "It's okay not to have all the answers. The people who claim to have everything figured out are often the ones who've stopped asking important questions.\n\nTell me what's making you feel lost. Saying it out loud often reveals more than we expect."
  ],
  hopeful: [
    "It's genuinely good to hear this. Hold onto what's working — not to chase it, but to understand it. What conditions created this feeling?\n\nCapturing what helps you becomes a personal toolkit for harder days. What's been different lately?",
    "That's really wonderful to hear. Progress — even small — deserves to be acknowledged.\n\nWhat are you feeling hopeful or excited about? I'd love to hear what's going well for you.",
    "This matters just as much as the hard moments. I'm glad you're in a good space.\n\nWhat's been feeding this sense of motivation or hope? Let's make sure we understand it so you can come back to it."
  ],
  neutral: [
    "I'm glad you reached out. Sometimes we don't have a specific label for what we're feeling — and that's completely fine. You can just talk, and we'll figure it out together.\n\nWhat's been on your mind lately?",
    "This is your space — no pressure to have it all figured out. What would feel most useful right now? We can talk through something specific, or just start wherever you are.",
    "Sometimes just having somewhere to think out loud makes a difference. I'm here and listening.\n\nWhat's going on in your world right now?"
  ]
};

const FOLLOWUPS = [
  "That makes a lot of sense. How long have you been carrying this?",
  "Thank you for trusting me with that. What does a typical day feel like for you right now?",
  "I hear you. Is there someone in your life you've been able to talk to about this?",
  "You're not alone in this, even when it feels that way. What would feel like a small step forward?",
  "That took courage to share. What do you need most right now — to be heard, to find solutions, or just some reassurance?",
  "I appreciate your honesty. Have you noticed any patterns in when these feelings are strongest?",
  "What has helped you get through difficult moments in the past?",
  "That's a lot to carry. On a scale of 1 to 10, how are you doing overall right now?",
  "Can you tell me a bit more about that? I want to make sure I understand fully.",
  "Your feelings are completely valid. What feels most important for us to focus on together?"
];

let msgCount = 0;

function detectMood(text) {
  const lower = text.toLowerCase();
  for (const [key, data] of Object.entries(MOODS)) {
    if (data.keys.some(k => lower.includes(k))) return key;
  }
  return 'neutral';
}

function updateMoodBadge(mood) {
  const d = MOODS[mood] || { color:'#8892a4', label:'Neutral' };
  const badge = document.getElementById('mood-badge');
  badge.innerHTML = '<span class="mood-dot" style="background:' + d.color + '"></span> ' + d.label;
  badge.style.color = d.color;
  badge.style.background = d.color + '18';
  badge.style.borderColor = d.color + '40';
  document.getElementById('crisis-banner').style.display = mood === 'crisis' ? 'block' : 'none';
}

function getResponse(mood) {
  const pool = RESPONSES[mood] || RESPONSES.neutral;
  if (msgCount > 2 && Math.random() < 0.3) {
    return FOLLOWUPS[Math.floor(Math.random() * FOLLOWUPS.length)];
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

function getTime() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function appendMessage(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message ' + role;

  const avatar = document.createElement('div');
  avatar.className = 'avatar ' + role;
  avatar.textContent = role === 'ai' ? '🧠' : '👤';

  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br/>');

  const time = document.createElement('div');
  time.className = 'bubble-time';
  time.textContent = getTime();

  wrap.appendChild(bubble);
  wrap.appendChild(time);

  if (role === 'user') { div.appendChild(wrap); div.appendChild(avatar); }
  else { div.appendChild(avatar); div.appendChild(wrap); }

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message ai'; div.id = 'typing-msg';
  const av = document.createElement('div');
  av.className = 'avatar ai'; av.textContent = '🧠';
  const b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
  div.appendChild(av); div.appendChild(b);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-msg');
  if (el) el.remove();
}

function sendQuick(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  msgCount++;

  appendMessage('user', text);
  const mood = detectMood(text);
  updateMoodBadge(mood);
  showTyping();

  setTimeout(function() {
    removeTyping();
    appendMessage('ai', getResponse(mood));
  }, 1200 + Math.random() * 900);
}

const ta = document.getElementById('user-input');
ta.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
ta.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
</body>
</html>
